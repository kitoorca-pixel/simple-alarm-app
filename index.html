<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alarm</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    .clock {
      font-size: 72px;
      font-weight: 200;
      letter-spacing: -2px;
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
    }

    .date {
      font-size: 14px;
      color: #666;
      margin-bottom: 48px;
    }

    .add-alarm {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
    }

    input[type="time"] {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: #fff;
      font-size: 20px;
      padding: 12px 16px;
      outline: none;
      cursor: pointer;
      color-scheme: dark;
    }

    input[type="time"]:focus {
      border-color: #444;
    }

    button.add-btn {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button.add-btn:hover {
      opacity: 0.85;
    }

    .alarms {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .alarm-item {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #2a2a2a;
      transition: border-color 0.2s;
    }

    .alarm-item.active {
      border-color: #3a3a3a;
    }

    .alarm-item.ringing {
      border-color: #fff;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 1; }
      to { opacity: 0.6; }
    }

    .alarm-time {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: -0.5px;
      font-variant-numeric: tabular-nums;
    }

    .alarm-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .toggle {
      width: 44px;
      height: 26px;
      background: #2a2a2a;
      border-radius: 13px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
      border: none;
      flex-shrink: 0;
    }

    .toggle.on {
      background: #fff;
    }

    .toggle::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: #666;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle.on::after {
      transform: translateX(18px);
      background: #000;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 4px;
      transition: color 0.15s;
    }

    .delete-btn:hover {
      color: #888;
    }

    .empty {
      color: #333;
      font-size: 14px;
      text-align: center;
      margin-top: 16px;
    }

    .stop-btn {
      display: none;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 12px 32px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 24px;
      transition: opacity 0.15s;
    }

    .stop-btn.visible {
      display: block;
    }

    .stop-btn:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <div class="clock" id="clock">00:00:00</div>
  <div class="date" id="date"></div>

  <div class="add-alarm">
    <input type="time" id="time-input">
    <button class="add-btn" onclick="addAlarm()">追加</button>
  </div>

  <div class="alarms" id="alarms-list">
    <div class="empty" id="empty-msg">アラームがありません</div>
  </div>

  <button class="stop-btn" id="stop-btn" onclick="stopAlarm()">アラームを止める</button>

  <audio id="alarm-audio" loop>
    <source src="data:audio/wav;base64," type="audio/wav">
  </audio>

  <script>
    let alarms = JSON.parse(localStorage.getItem('alarms') || '[]');
    let ringingId = null;
    let audioCtx = null;
    let audioNodes = [];

    function startBeep() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      function beep() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.4);
        audioNodes.push(osc);
      }
      beep();
      window._beepInterval = setInterval(beep, 600);
    }

    function stopBeep() {
      if (window._beepInterval) {
        clearInterval(window._beepInterval);
        window._beepInterval = null;
      }
      audioNodes.forEach(n => { try { n.stop(); } catch(e) {} });
      audioNodes = [];
      if (audioCtx) {
        audioCtx.close();
        audioCtx = null;
      }
    }

    function updateClock() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const ss = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;

      const days = ['日', '月', '火', '水', '木', '金', '土'];
      const y = now.getFullYear();
      const mo = now.getMonth() + 1;
      const d = now.getDate();
      const dow = days[now.getDay()];
      document.getElementById('date').textContent = `${y}年${mo}月${d}日（${dow}）`;

      const currentTime = `${hh}:${mm}`;
      alarms.forEach(alarm => {
        if (alarm.enabled && alarm.time === currentTime && ss === '00' && ringingId !== alarm.id) {
          triggerAlarm(alarm.id);
        }
      });
    }

    function triggerAlarm(id) {
      ringingId = id;
      startBeep();
      document.getElementById('stop-btn').classList.add('visible');
      renderAlarms();
    }

    function stopAlarm() {
      stopBeep();
      ringingId = null;
      document.getElementById('stop-btn').classList.remove('visible');
      renderAlarms();
    }

    function addAlarm() {
      const input = document.getElementById('time-input');
      const time = input.value;
      if (!time) return;
      const alarm = { id: Date.now(), time, enabled: true };
      alarms.push(alarm);
      alarms.sort((a, b) => a.time.localeCompare(b.time));
      save();
      renderAlarms();
    }

    function toggleAlarm(id) {
      const alarm = alarms.find(a => a.id === id);
      if (alarm) {
        alarm.enabled = !alarm.enabled;
        if (!alarm.enabled && ringingId === id) stopAlarm();
        save();
        renderAlarms();
      }
    }

    function deleteAlarm(id) {
      if (ringingId === id) stopAlarm();
      alarms = alarms.filter(a => a.id !== id);
      save();
      renderAlarms();
    }

    function save() {
      localStorage.setItem('alarms', JSON.stringify(alarms));
    }

    function renderAlarms() {
      const list = document.getElementById('alarms-list');
      const empty = document.getElementById('empty-msg');
      list.innerHTML = '';

      if (alarms.length === 0) {
        list.appendChild(empty);
        return;
      }

      alarms.forEach(alarm => {
        const item = document.createElement('div');
        item.className = 'alarm-item' +
          (alarm.enabled ? ' active' : '') +
          (ringingId === alarm.id ? ' ringing' : '');

        item.innerHTML = `
          <span class="alarm-time">${alarm.time}</span>
          <div class="alarm-controls">
            <button class="toggle ${alarm.enabled ? 'on' : ''}" onclick="toggleAlarm(${alarm.id})"></button>
            <button class="delete-btn" onclick="deleteAlarm(${alarm.id})">✕</button>
          </div>
        `;
        list.appendChild(item);
      });
    }

    renderAlarms();
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
